apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth-server
  namespace: smartcity-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth-server
  template:
    metadata:
      labels:
        app: oauth-server
    spec:
      containers:
      - name: oauth-server
        image: smart-city-platform-oauth-server:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3002
        envFrom:
        - configMapRef:
            name: smartcity-config
        - secretRef:
            name: smartcity-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: oauth-server
  namespace: smartcity-platform
spec:
  selector:
    app: oauth-server
  ports:
    - port: 3002
      targetPort: 3002