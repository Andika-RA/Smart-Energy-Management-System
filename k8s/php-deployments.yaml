# 1. CITIZEN SERVICE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: citizen-service
  namespace: smartcity-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: citizen-service
  template:
    metadata:
      labels:
        app: citizen-service
    spec:
      containers:
      - name: citizen-service
        image: smart-city-platform-php-citizen:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        envFrom:
        - configMapRef:
            name: smartcity-config
        - secretRef:
            name: smartcity-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: citizen-service
  namespace: smartcity-platform
spec:
  selector:
    app: citizen-service
  ports:
    - port: 80
      targetPort: 80
---
