# docker-compose.yml
networks:
  smartcity-net:
    driver: bridge

volumes:
  mysql-data:
  rabbitmq-data:
  grafana-data:

services:
  # ── INFRASTRUKTUR UTAMA ──────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: smartcity-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - ./database:/docker-entrypoint-initdb.d 
      - mysql-data:/var/lib/mysql
    networks:
      - smartcity-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: smartcity-rabbitmq
    ports:
      - "5672:5672"   
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - smartcity-net
  
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: smartcity-mosquitto
    ports: 
      - "18830:1883"
    volumes: 
      - ./iot/mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks: 
      - smartcity-net
 
  # ── MICROSERVICES CORE ───────────────────────────────────────────────────
  oauth-server:
    build: ./oauth-server
    container_name: smartcity-oauth
    ports: ["3002:3002"]
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    depends_on:
      mysql:
        condition: service_healthy
    networks: 
      - smartcity-net

  api-gateway:
    build: ./express-gateway
    container_name: smartcity-gateway
    ports: 
      - "3060:3060"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - OAUTH_SERVER_URL=http://oauth-server:3002
      - CITIZEN_SERVICE_URL=http://citizen-service:80
      - GRID_SERVICE_URL=http://grid-service:80
      - POWER_SERVICE_URL=http://power-service:80
      - PYTHON_ML_URL=http://python-ml:5000
    depends_on: 
      - rabbitmq
      - oauth-server
    networks: 
      - smartcity-net
 
  citizen-service:
    build: ./php-citizen
    container_name: smartcity-citizen
    ports:
      - "8000:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartcity-net
  
  grid-service:
    build: ./php-grid
    container_name: smartcity-grid
    ports:
      - "8001:80"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    depends_on:
      mysql:
        condition: service_healthy
    networks: 
      - smartcity-net

  power-service:
    build: ./php-power
    container_name: smartcity-power
    ports:
      - "8002:80"
    environment: 
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    depends_on:
      mysql:
        condition: service_healthy
    networks: 
      - smartcity-net
  
  citizen-worker:
    build: ./php-citizen
    container_name: smartcity-citizen-worker
    command: ["php", "public/worker.php"]
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - smartcity-net
 
  # ── AI & IOT LAYER ───────────────────────────────────────────────────────
  python-ml:
    build: ./python-ml-service
    container_name: smartcity-python-ml
    ports:
      - "5000:5000"
    environment: 
      - RABBITMQ_HOST=${RABBITMQ_HOST}
    depends_on: 
      - rabbitmq
    networks: 
      - smartcity-net
 
  node-red:
    image: nodered/node-red:3.1
    container_name: smartcity-nodered
    ports: 
      - "18800:1880"
    volumes: 
      - ./iot/node-red-data:/data
    networks: 
      - smartcity-net

  iot-simulator:
    build: ./iot
    container_name: smartcity-iot-monitor
    env_file: .env
    depends_on:
      - mosquitto
    networks:
      - smartcity-net
 
  # ── MONITORING ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smartcity-prometheus
    ports: 
      - "9090:9090" # Wajib Port 9090
    volumes: 
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks: 
      - smartcity-net
 
  grafana:
    image: grafana/grafana:10.2.0
    container_name: smartcity-grafana
    ports: 
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASS}
    volumes: 
      - grafana-data:/var/lib/grafana
    networks: 
      - smartcity-net